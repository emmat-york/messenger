<ng-container *ngrxLet="mainVM$; let mainVM">
  <app-contacts
    class="contacts"
    [selectedContactId]="mainVM.selectedContact?.id"
    [contacts]="mainVM.contacts"
    (setSelectedContactId)="setSelectedContact($event)"
  ></app-contacts>

  <section
    *ngIf="mainVM.contacts && mainVM.selectedContact; else noSelectedContact"
    class="chat-block"
  >
    <app-history [selectedContact]="mainVM.selectedContact"></app-history>
    <app-input></app-input>
  </section>
</ng-container>

<ng-template #noSelectedContact>
  <span>select any contact to start chatting...</span>
</ng-template>
