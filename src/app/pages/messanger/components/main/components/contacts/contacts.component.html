<app-input
  class="input"
  [formControl]="filterControl"
  placeholder="Search..."
></app-input>

<ul class="contact-list" *ngIf="contacts">
  <li
    class="contact"
    *ngFor="let contact of contacts | appContactsFilter: filterControl.value"
  >
    <app-contact [contact]="contact" (click)="onContactSelect(contact)"></app-contact>
  </li>
</ul>
