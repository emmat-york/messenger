<ul #messageList class="message-list">
  <li class="message" *ngFor="let message of selectedContact.messages">
    <app-message [message]="message" [avatar]="selectedContact.avatar"></app-message>
  </li>
</ul>

<app-scroll-circle
  class="scroll-circle"
  *ngIf="isScrollCircleShown"
  (click)="onScrollDown()"
></app-scroll-circle>
