<app-input
  class="input"
  [formControl]="filterControl"
  placeholder="Search..."
></app-input>

<ul *ngIf="contacts" class="contact-list">
  <li
    class="contact"
    *ngFor="let contact of contacts | appContactsFilter: filterControl.value"
  >
    <app-contact
      [class.selected]="contact.id === selectedContactId"
      [contact]="contact"
      (click)="onContactSelect(contact)"
    ></app-contact>
  </li>
</ul>
