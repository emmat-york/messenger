<section appClickOutside (clickOutside)="onClickOutSide()">
  <button
    class="dropdown-button"
    type="button"
    [disabled]="disabled"
    (click)="onDropdownClick()"
    (blur)="onDropdownBlur()"
  >
    <span class="value">{{ selectedValue | translate }}</span>
    <img
      [class.expanded]="isDropdownShown"
      [src]="icon.ExpandMore | appIcon"
      [alt]="icon.ExpandMore"
    />
  </button>

  <ul class="option-list" *ngIf="isDropdownShown">
    <li class="option" *ngFor="let option of options" (click)="onOptionClick(option)">
      {{ option.title | translate }}
    </li>
  </ul>
</section>
