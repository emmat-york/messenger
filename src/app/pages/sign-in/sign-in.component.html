<form class="form-group" [formGroup]="formGroup" (ngSubmit)="onSignIn()">
  <h1>{{ 'Auth.SignIn' | translate }}</h1>

  <div class="controls">
    <app-error-message *ngIf="errorMessage$ | async as errorMessage">
      {{ errorMessage }}
    </app-error-message>

    <div class="control">
      <app-label class="label" [for]="signInKey.Login">
        {{ 'Auth.Login' | translate }}
      </app-label>

      <app-input
        [classes]="getStateClasses(signInKey.Login)"
        [formControlName]="signInKey.Login"
        [id]="signInKey.Login"
      ></app-input>

      <app-error-message *ngIf="hasError(signInKey.Login)">
        {{ getErrorMessage(signInKey.Login) }}
      </app-error-message>
    </div>

    <div class="control">
      <app-label class="label" [for]="signInKey.Password">
        {{ 'Auth.Password' | translate }}
      </app-label>

      <app-input
        [classes]="getStateClasses(signInKey.Password)"
        [formControlName]="signInKey.Password"
        [id]="signInKey.Password"
      ></app-input>

      <app-error-message *ngIf="hasError(signInKey.Password)">
        {{ getErrorMessage(signInKey.Password) }}
      </app-error-message>
    </div>

    <app-button class="sign-up-button" variant="tertiary" routerLink="/sign-up">
      {{ 'Auth.SignUp' | translate }}
    </app-button>
  </div>

  <app-button [disabled]="!isSubmittable" type="submit">
    {{ 'Auth.Submit' | translate }}
  </app-button>
</form>

<app-language-switcher class="language-switcher"></app-language-switcher>
